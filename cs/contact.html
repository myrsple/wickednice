  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <div class="contact-divider"></div>
    <h1 class="contact-heading">KONTAKTUJTE NÁS</h1>

    <form class="contact-form" action="https://formspree.io/f/xykbvnlj" method="POST">
      <div class="contact-field">
        <input type="text" id="name" name="name" class="contact-input" placeholder="JMÉNO" autocomplete="name">
      </div>
      <div class="contact-field">
        <input type="email" id="email" name="email" class="contact-input" placeholder="E-MAIL" autocomplete="email">
      </div>
      <div class="contact-field contact-field--message">
        <textarea id="message" name="message" class="contact-textarea" placeholder="ZPRÁVA"></textarea>
      </div>
      <button type="submit" class="contact-submit">Odeslat</button>
    </form>
  </section>
