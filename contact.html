<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Contact — Wicked Nice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- STICKY MENU -->
  <nav class="menu" id="menu">
    <div class="menu-inner">
      <div class="menu-logo">
        <a href="index.html"><img src="public/images/monogram-menu.svg" alt="WN"></a>
      </div>
      <div class="menu-nav">
        <a href="index.html#services" class="menu-link">Services</a>
        <a href="projects.html" class="menu-link">Projects</a>
        <a href="index.html#about" class="menu-link">About</a>
        <a href="contact.html" class="menu-link menu-link--contact menu-link--current-contact">Contact</a>
      </div>
      <div class="menu-lang">
        <button class="lang-btn lang-btn--active">EN</button>
        <button class="lang-btn">CZ</button>
      </div>
    </div>
  </nav>

  <!-- LOGO -->
  <section class="logo-section">
    <img src="public/images/logo.svg" alt="Wicked Nice" class="logo-img">
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <div class="contact-divider"></div>
    <h1 class="contact-heading">CONTACT US</h1>
    <div class="contact-info">
      <p>wickednice@gmail.com</p>
      <p>+420 733 571 882</p>
    </div>

    <form class="contact-form" action="#" method="post">
      <div class="contact-field">
        <label for="name" class="contact-label">NAME</label>
        <input type="text" id="name" name="name" class="contact-input" autocomplete="name">
      </div>
      <div class="contact-field">
        <label for="email" class="contact-label">E-MAIL</label>
        <input type="email" id="email" name="email" class="contact-input" autocomplete="email">
      </div>
      <div class="contact-field contact-field--message">
        <label for="message" class="contact-label">MESSAGE</label>
        <textarea id="message" name="message" class="contact-textarea"></textarea>
      </div>
      <button type="submit" class="contact-submit">Contact</button>
    </form>
  </section>

  <!-- PRE-FOOTER IMAGE -->
  <section class="pre-footer-image">
    <img src="public/images/contact-prefooter.jpg" alt="Wicked Nice">
  </section>

  <!-- FOOTER -->
  <footer class="footer" id="footer">
    <div class="footer-top">
      <div class="footer-col footer-menu-links">
        <a href="#">Projets</a>
        <a href="#">Publications</a>
        <a href="#">Vision</a>
        <a href="#">Le Studio</a>
        <a href="#">Interventions</a>
      </div>
      <div class="footer-col footer-social">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Behance</a>
        <a href="#">Twitter</a>
      </div>
      <div class="footer-contact">
        <p>CONTACT: wickednice@gmail.com</p>
        <p>IG: wickednice</p>
      </div>
    </div>
    <div class="footer-logo">
      <img src="public/images/logo-footer.svg" alt="Wicked Nice">
    </div>
    <div class="footer-copyright">
      &copy; WICKED NICE Studio &mdash; PRAGUE / CZECHIA &mdash; 2026
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
