<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Wicked Nice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- STICKY MENU -->
  <nav class="menu" id="menu">
    <div class="menu-inner">
      <div class="menu-logo">
        <a href="index.html"><img src="public/images/monogram-menu.svg" alt="WN"></a>
      </div>
      <div class="menu-nav">
        <a href="index.html#projects" class="menu-link">Projects</a>
        <a href="index.html#services" class="menu-link">Services</a>
        <a href="index.html#about" class="menu-link">About</a>
        <a href="contact.html" class="menu-link menu-link--current">Contact Us</a>
      </div>
      <div class="menu-lang">
        <button class="lang-btn lang-btn--active">EN</button>
        <button class="lang-btn">CZ</button>
      </div>
    </div>
  </nav>

  <!-- LOGO -->
  <section class="logo-section">
    <img src="public/images/logo.svg" alt="Wicked Nice" class="logo-img">
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <div class="contact-divider"></div>
    <h1 class="contact-heading">CONTACT US</h1>

    <form class="contact-form" action="#" method="post">
      <div class="contact-field">
        <input type="text" id="name" name="name" class="contact-input" placeholder="NAME" autocomplete="name">
      </div>
      <div class="contact-field">
        <input type="email" id="email" name="email" class="contact-input" placeholder="E-MAIL" autocomplete="email">
      </div>
      <div class="contact-field contact-field--message">
        <textarea id="message" name="message" class="contact-textarea" placeholder="MESSAGE"></textarea>
      </div>
      <button type="submit" class="contact-submit">Send it</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-socials">
        <a href="https://www.linkedin.com/company/wickednice/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://www.instagram.com/wickednice.xyz/" target="_blank" rel="noopener">Instagram</a>
      </div>
      <div class="footer-contact">
        <p><a href="mailto:hi@wickednice.xyz">hi@wickednice.xyz</a></p>
      </div>
    </div>
    <div class="footer-logo">
      <img src="public/images/logo.svg" alt="Wicked Nice">
    </div>
    <div class="footer-copyright">
      &copy; 2026 WICKED NICE Studio – PRAGUE, CZECHIA
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
